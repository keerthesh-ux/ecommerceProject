<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BookStore+ | Apple TV Style E-commerce</title>
    <!-- Font Awesome 6 & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* ========== GLOBAL RESET & APPLE TV DARK AESTHETIC ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* haptic active class (subtle scale effect) */
        .haptic-feedback {
            transform: scale(0.97);
            transition: transform 0.05s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* ========== STICKY GLASS HEADER ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(0, 0, 0, 0.75);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 28px;
            background: linear-gradient(135deg, #ff8c5a, #ff2d7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-weight: 700;
            font-size: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #fff, #e0e0e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* search bar — apple tv style */
        .search-wrapper {
            flex: 1;
            max-width: 480px;
            margin: 0 20px;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(8px);
            border-radius: 44px;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }

        .search-container:focus-within {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ff9f4a;
            box-shadow: 0 0 0 2px rgba(255, 159, 74, 0.3);
        }

        .search-container i {
            color: #aaa;
            font-size: 18px;
            margin-right: 12px;
        }

        .search-container input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            width: 100%;
            font-weight: 500;
        }

        .search-container input::placeholder {
            color: #aaa;
            font-weight: 400;
        }

        .nav-icons {
            display: flex;
            gap: 28px;
            align-items: center;
        }

        .nav-icon {
            position: relative;
            cursor: pointer;
            font-size: 22px;
            transition: transform 0.2s ease;
            color: #f2f2f2;
        }

        .nav-icon:hover {
            transform: scale(1.05);
            color: #ff9f4a;
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #ff3b30;
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 40px;
            min-width: 18px;
            text-align: center;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
        }

        /* HERO SECTION (Apple TV large card) */
        .hero {
            margin: 24px 40px 32px 40px;
            border-radius: 40px;
            overflow: hidden;
            background: #1c1c1e;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .hero-slide {
            position: relative;
            height: 460px;
            background-size: cover;
            background-position: center 30%;
            display: flex;
            align-items: flex-end;
            padding: 40px;
        }

        .hero-content {
            background: linear-gradient(0deg, rgba(0,0,0,0.75) 10%, transparent);
            padding: 20px 0;
            max-width: 55%;
        }

        .hero-genre {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ffb347;
            margin-bottom: 10px;
        }

        .hero-title {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .hero-desc {
            font-size: 16px;
            opacity: 0.85;
            margin-bottom: 24px;
        }

        .hero-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* Buttons */
        .btn-primary {
            background: white;
            color: black;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline-light {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.4);
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover, .btn-outline-light:hover {
            transform: scale(1.02);
        }

        /* Genre chips & section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 32px 40px 16px 40px;
        }
        .section-header h2 {
            font-size: 28px;
            font-weight: 600;
        }
        .genre-filter {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 0 40px 24px 40px;
        }
        .genre-chip {
            background: #1c1c1e;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #ddd;
        }
        .genre-chip.active, .genre-chip:hover {
            background: #ff9f4a;
            color: #000;
            font-weight: 600;
        }

        /* Horizontal scroll books row */
        .books-row {
            display: flex;
            overflow-x: auto;
            scrollbar-width: thin;
            gap: 20px;
            padding: 8px 40px 40px 40px;
            scroll-behavior: smooth;
        }
        .books-row::-webkit-scrollbar {
            height: 5px;
        }
        .books-row::-webkit-scrollbar-track {
            background: #2c2c2e;
            border-radius: 10px;
        }
        .books-row::-webkit-scrollbar-thumb {
            background: #ff9f4a;
            border-radius: 10px;
        }
        .book-card {
            min-width: 200px;
            width: 200px;
            background: #141414;
            border-radius: 28px;
            transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.3s;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .book-card:hover {
            transform: scale(1.03);
            box-shadow: 0 18px 32px rgba(0,0,0,0.5);
        }
        .book-cover {
            width: 100%;
            height: 280px;
            background-size: cover;
            background-position: center;
        }
        .book-info {
            padding: 14px 12px 16px;
        }
        .book-title {
            font-weight: 700;
            font-size: 16px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .book-author {
            font-size: 13px;
            color: #aaa;
            margin: 4px 0;
        }
        .book-price {
            font-weight: 700;
            color: #ffb347;
            margin-top: 6px;
            font-size: 15px;
        }
        .card-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            gap: 8px;
        }
        .icon-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 30px;
            padding: 6px 12px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn.wishlist-active {
            color: #ff5e62;
            background: rgba(255,94,98,0.2);
        }

        /* Side Panel (Cart / Wishlist) */
        .overlay-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            height: 100vh;
            background: rgba(20,20,24,0.98);
            backdrop-filter: blur(28px);
            z-index: 200;
            box-shadow: -5px 0 30px rgba(0,0,0,0.6);
            transition: right 0.3s ease;
            padding: 24px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.15);
        }
        .overlay-panel.open {
            right: 0;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .panel-items {
            flex: 1;
            overflow-y: auto;
        }
        .panel-item {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            background: #1e1e22;
            border-radius: 20px;
            padding: 10px;
        }
        .panel-item-img {
            width: 55px;
            height: 75px;
            background-size: cover;
            border-radius: 10px;
        }
        .remove-item {
            color: #ff8a7a;
            cursor: pointer;
            font-size: 12px;
            margin-top: 4px;
            display: inline-block;
        }
        .panel-total {
            border-top: 1px solid #2c2c2e;
            padding-top: 18px;
            margin-top: 12px;
            font-weight: 700;
        }
        .checkout-btn {
            width: 100%;
            background: white;
            color: black;
            border: none;
            border-radius: 40px;
            padding: 14px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 18px;
        }
        @media (max-width: 800px) {
            .hero-slide { height: 380px; }
            .hero-title { font-size: 32px; }
            .hero-content { max-width: 80%; }
            .header { padding: 12px 20px; }
            .search-wrapper { max-width: 100%; margin: 0; }
            .books-row { padding: 8px 20px 32px 20px; }
            .section-header, .genre-filter { margin-left: 20px; margin-right: 20px; }
            .overlay-panel { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo-area">
        <i class="fas fa-book-open logo-icon"></i>
        <span class="logo-text">BookStream+</span>
    </div>
    <div class="search-wrapper">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search books by title, author or genre...">
        </div>
    </div>
    <div class="nav-icons">
        <div class="nav-icon" id="wishlistIconBtn">
            <i class="fas fa-heart"></i>
            <span id="wishlistBadge" class="badge" style="display: none;">0</span>
        </div>
        <div class="nav-icon" id="cartIconBtn">
            <i class="fas fa-shopping-bag"></i>
            <span id="cartBadge" class="badge" style="display: none;">0</span>
        </div>
    </div>
</header>

<div class="hero" id="heroContainer"></div>
<div class="genre-filter" id="genreFilterContainer"></div>
<div class="section-header">
    <h2>Browse Books</h2>
    <span style="font-size:13px; color:#aaa;"><i class="fas fa-chevron-right"></i> Scroll →</span>
</div>
<div class="books-row" id="booksRow"></div>

<div id="sidePanel" class="overlay-panel">
    <div class="panel-header">
        <h3 id="panelTitle">Shopping Cart</h3>
        <i class="fas fa-times close-panel" id="closePanelBtn"></i>
    </div>
    <div id="panelItemsList" class="panel-items"></div>
    <div id="panelFooter" style="display: none;">
        <div class="panel-total" id="panelTotal"></div>
        <button class="checkout-btn" id="checkoutActionBtn">Proceed to Buy</button>
    </div>
</div>

<script>
    // ================================
    // 1. BOOK DATABASE
    // ================================
    const booksCatalog = [
        { id: 1, title: "The Midnight Library", author: "Matt Haig", price: 18.99, genre: "Fiction", cover: "https://picsum.photos/id/20/400/600", featured: true },
        { id: 2, title: "Project Hail Mary", author: "Andy Weir", price: 24.99, genre: "Sci-Fi", cover: "https://picsum.photos/id/0/400/600", featured: false },
        { id: 3, title: "Atomic Habits", author: "James Clear", price: 16.99, genre: "Self-Help", cover: "https://picsum.photos/id/26/400/600", featured: false },
        { id: 4, title: "Where the Crawdads Sing", author: "Delia Owens", price: 14.99, genre: "Fiction", cover: "https://picsum.photos/id/42/400/600", featured: false },
        { id: 5, title: "Dune", author: "Frank Herbert", price: 22.50, genre: "Sci-Fi", cover: "https://picsum.photos/id/1/400/600", featured: true },
        { id: 6, title: "Becoming", author: "Michelle Obama", price: 19.99, genre: "Biography", cover: "https://picsum.photos/id/64/400/600", featured: false },
        { id: 7, title: "The Psychology of Money", author: "Morgan Housel", price: 15.99, genre: "Finance", cover: "https://picsum.photos/id/29/400/600", featured: false },
        { id: 8, title: "Klara and the Sun", author: "Kazuo Ishiguro", price: 21.00, genre: "Fiction", cover: "https://picsum.photos/id/55/400/600", featured: false },
        { id: 9, title: "Sapiens", author: "Yuval Harari", price: 26.99, genre: "History", cover: "https://picsum.photos/id/91/400/600", featured: false },
        { id: 10, title: "The Silent Patient", author: "Alex Michaelides", price: 13.99, genre: "Thriller", cover: "https://picsum.photos/id/104/400/600", featured: false },
        { id: 11, title: "Educated", author: "Tara Westover", price: 17.50, genre: "Biography", cover: "https://picsum.photos/id/88/400/600", featured: false },
        { id: 12, title: "Hyperion", author: "Dan Simmons", price: 20.99, genre: "Sci-Fi", cover: "https://picsum.photos/id/96/400/600", featured: false },
        { id: 13, title: "Meditations", author: "Marcus Aurelius", price: 12.99, genre: "Philosophy", cover: "https://picsum.photos/id/36/400/600", featured: false },
        { id: 14, title: "The Thursday Murder Club", author: "Richard Osman", price: 15.99, genre: "Mystery", cover: "https://picsum.photos/id/38/400/600", featured: false }
    ];

    // ================================
    // 2. GLOBAL STATE
    // ================================
    let cart = [];           // { id, title, price, cover, qty }
    let wishlist = [];      // array of book ids
    let activeGenre = "All";
    let searchQuery = "";
    let currentPanelMode = "cart";   // 'cart' or 'wishlist'

    // ================================
    // 3. HAPTIC FEEDBACK (visual + vibration if supported)
    // ================================
    function triggerHaptic(element) {
        if (!element) return;
        element.classList.add("haptic-feedback");
        setTimeout(() => {
            element.classList.remove("haptic-feedback");
        }, 100);
        // Vibration API for mobile haptic (gentle)
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(12);
        }
    }

    // Attach haptic to any clickable element dynamically (global delegation)
    document.body.addEventListener('click', (e) => {
        const target = e.target.closest('button, .nav-icon, .genre-chip, .icon-btn, .checkout-btn, .close-panel, .remove-item, .book-card');
        if (target) triggerHaptic(target);
    }, false);

    // ================================
    // 4. LOCALSTORAGE & BADGE UPDATES
    // ================================
    function updateBadges() {
        const cartCount = cart.reduce((sum, i) => sum + i.qty, 0);
        const wishCount = wishlist.length;
        const cartBadge = document.getElementById("cartBadge");
        const wishBadge = document.getElementById("wishlistBadge");
        if (cartCount > 0) { cartBadge.style.display = "inline-block"; cartBadge.innerText = cartCount; } else cartBadge.style.display = "none";
        if (wishCount > 0) { wishBadge.style.display = "inline-block"; wishBadge.innerText = wishCount; } else wishBadge.style.display = "none";
        localStorage.setItem("bookstore_cart", JSON.stringify(cart));
        localStorage.setItem("bookstore_wish", JSON.stringify(wishlist));
    }

    function loadStorage() {
        const savedCart = localStorage.getItem("bookstore_cart");
        if (savedCart) cart = JSON.parse(savedCart);
        const savedWish = localStorage.getItem("bookstore_wish");
        if (savedWish) wishlist = JSON.parse(savedWish);
        updateBadges();
    }

    // ================================
    // 5. CART & WISHLIST HELPERS
    // ================================
    function addToCart(book, qty = 1) {
        const existing = cart.find(item => item.id === book.id);
        if (existing) existing.qty += qty;
        else cart.push({ id: book.id, title: book.title, price: book.price, cover: book.cover, qty: qty });
        updateBadges();
        if (currentPanelMode === "cart" && document.getElementById("sidePanel").classList.contains("open")) renderPanelContent();
    }

    function removeFromCart(bookId) {
        cart = cart.filter(item => item.id !== bookId);
        updateBadges();
        if (currentPanelMode === "cart") renderPanelContent();
    }

    function updateCartQuantity(bookId, delta) {
        const item = cart.find(i => i.id === bookId);
        if (item) {
            const newQty = item.qty + delta;
            if (newQty <= 0) removeFromCart(bookId);
            else { item.qty = newQty; updateBadges(); renderPanelContent(); }
        }
    }

    function toggleWishlist(book) {
        const idx = wishlist.indexOf(book.id);
        if (idx === -1) wishlist.push(book.id);
        else wishlist.splice(idx, 1);
        updateBadges();
        renderFilteredBooks();  // refresh hearts
        if (currentPanelMode === "wishlist" && document.getElementById("sidePanel").classList.contains("open")) renderPanelContent();
    }

    function isInWishlist(bookId) { return wishlist.includes(bookId); }

    function buyNow(book) {
        alert(`✨ "${book.title}" purchased! (Demo flow) Total: $${book.price}. Thank you for shopping.`);
        // optional: haptic already triggered
    }

    // ================================
    // 6. FILTER & SEARCH LOGIC (combined)
    // ================================
    function getFilteredBooks() {
        let filtered = activeGenre === "All" ? [...booksCatalog] : booksCatalog.filter(b => b.genre === activeGenre);
        if (searchQuery.trim() !== "") {
            const lowerQuery = searchQuery.toLowerCase();
            filtered = filtered.filter(book =>
                book.title.toLowerCase().includes(lowerQuery) ||
                book.author.toLowerCase().includes(lowerQuery) ||
                book.genre.toLowerCase().includes(lowerQuery)
            );
        }
        return filtered;
    }

    function renderFilteredBooks() {
        const filtered = getFilteredBooks();
        const row = document.getElementById("booksRow");
        if (filtered.length === 0) {
            row.innerHTML = `<div class="no-results"><i class="fas fa-book-open"></i> No books found.<br>Try different keywords or genre.</div>`;
            return;
        }
        row.innerHTML = filtered.map(book => `
            <div class="book-card" data-book-id="${book.id}">
                <div class="book-cover" style="background-image: url('${book.cover}');"></div>
                <div class="book-info">
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                    <div class="book-price">$${book.price.toFixed(2)}</div>
                    <div class="card-actions">
                        <button class="icon-btn addCartBtn" data-id="${book.id}"><i class="fas fa-cart-plus"></i> Cart</button>
                        <button class="icon-btn buyNowBtn" data-id="${book.id}"><i class="fas fa-bolt"></i> Buy</button>
                        <button class="icon-btn wishlistBtn ${isInWishlist(book.id) ? 'wishlist-active' : ''}" data-id="${book.id}"><i class="fas fa-heart"></i></button>
                    </div>
                </div>
            </div>
        `).join("");

        // attach events
        document.querySelectorAll(".addCartBtn").forEach(btn => {
            btn.addEventListener("click", (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const book = booksCatalog.find(b => b.id === id); if(book) addToCart(book,1); });
        });
        document.querySelectorAll(".buyNowBtn").forEach(btn => {
            btn.addEventListener("click", (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const book = booksCatalog.find(b => b.id === id); if(book) buyNow(book); });
        });
        document.querySelectorAll(".wishlistBtn").forEach(btn => {
            btn.addEventListener("click", (e) => { e.stopPropagation(); const id = parseInt(btn.dataset.id); const book = booksCatalog.find(b => b.id === id); if(book) toggleWishlist(book); });
        });
    }

    // ================================
    // 7. HERO (featured dynamic)
    // ================================
    function renderHero() {
        const featured = booksCatalog.find(b => b.featured === true) || booksCatalog[0];
        const heroDiv = document.getElementById("heroContainer");
        heroDiv.innerHTML = `
            <div class="hero-slide" style="background-image: linear-gradient(0deg, #000000bb, #00000099), url('${featured.cover}'); background-size: cover;">
                <div class="hero-content">
                    <div class="hero-genre">${featured.genre} • FEATURED PICK</div>
                    <div class="hero-title">${featured.title}</div>
                    <div class="hero-desc">by ${featured.author} — one of the most immersive stories.</div>
                    <div class="hero-buttons">
                        <button class="btn-primary" id="heroBuyNowBtn"><i class="fas fa-bolt"></i> Buy now</button>
                        <button class="btn-outline-light" id="heroAddToCartBtn"><i class="fas fa-cart-plus"></i> Add to cart</button>
                        <button class="btn-outline-light" id="heroWishlistBtn"><i class="fas fa-heart"></i> Wishlist</button>
                    </div>
                </div>
            </div>
        `;
        const heroBook = featured;
        document.getElementById("heroBuyNowBtn")?.addEventListener("click", () => buyNow(heroBook));
        document.getElementById("heroAddToCartBtn")?.addEventListener("click", () => addToCart(heroBook,1));
        document.getElementById("heroWishlistBtn")?.addEventListener("click", () => toggleWishlist(heroBook));
    }

    // ================================
    // 8. GENRE FILTER UI
    // ================================
    function renderGenreFilters() {
        const genres = ["All", ...new Set(booksCatalog.map(b => b.genre))];
        const container = document.getElementById("genreFilterContainer");
        container.innerHTML = genres.map(g => `<div class="genre-chip ${activeGenre === g ? 'active' : ''}" data-genre="${g}">${g}</div>`).join("");
        document.querySelectorAll(".genre-chip").forEach(chip => {
            chip.addEventListener("click", () => {
                activeGenre = chip.dataset.genre;
                renderGenreFilters();
                renderFilteredBooks();
            });
        });
    }

    // ================================
    // 9. SIDE PANEL (CART / WISHLIST)
    // ================================
    function renderPanelContent() {
        const container = document.getElementById("panelItemsList");
        const footerDiv = document.getElementById("panelFooter");
        const titleElem = document.getElementById("panelTitle");
        if (currentPanelMode === "cart") {
            titleElem.innerText = "🛒 Shopping Cart";
            if (cart.length === 0) { container.innerHTML = `<div style="text-align:center; margin-top:40px;">🛍️ Cart is empty</div>`; footerDiv.style.display = "none"; return; }
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="panel-item">
                        <div class="panel-item-img" style="background-image: url('${item.cover}');"></div>
                        <div class="panel-item-details">
                            <div><strong>${item.title}</strong></div>
                            <div>$${item.price.toFixed(2)} x ${item.qty}</div>
                            <div style="display:flex; gap:10px; margin-top:6px;">
                                <span class="remove-item" data-id="${item.id}" data-delta="-1"><i class="fas fa-minus-circle"></i> Remove one</span>
                                <span class="remove-item" data-id="${item.id}" data-delta="full"><i class="fas fa-trash-alt"></i> Remove all</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
            document.getElementById("panelTotal").innerHTML = `Total: $${total.toFixed(2)}`;
            footerDiv.style.display = "block";
            document.querySelectorAll(".remove-item").forEach(el => {
                el.addEventListener("click", (e) => {
                    const id = parseInt(el.dataset.id);
                    const delta = el.dataset.delta;
                    if (delta === "-1") updateCartQuantity(id, -1);
                    else if (delta === "full") removeFromCart(id);
                });
            });
        } else {
            titleElem.innerText = "❤️ Wishlist";
            if (wishlist.length === 0) { container.innerHTML = `<div style="text-align:center; margin-top:40px;">✨ No favorites yet</div>`; footerDiv.style.display = "none"; return; }
            const wishItems = wishlist.map(id => booksCatalog.find(b => b.id === id)).filter(b => b);
            container.innerHTML = wishItems.map(book => `
                <div class="panel-item">
                    <div class="panel-item-img" style="background-image: url('${book.cover}');"></div>
                    <div class="panel-item-details">
                        <div><strong>${book.title}</strong></div>
                        <div>$${book.price.toFixed(2)}</div>
                        <div style="margin-top: 8px; display:flex; gap:12px;">
                            <button class="icon-btn wishMoveToCart" data-id="${book.id}" style="background:#ff9f4a; color:black;">Add to Cart</button>
                            <span class="remove-item" data-id="${book.id}" style="color:#ff9f4a;">Remove</span>
                        </div>
                    </div>
                </div>
            `).join("");
            footerDiv.style.display = "none";
            document.querySelectorAll(".wishMoveToCart").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    const book = booksCatalog.find(b => b.id === id);
                    if(book) addToCart(book,1);
                });
            });
            document.querySelectorAll(".remove-item[data-id]").forEach(el => {
                el.addEventListener("click", (e) => {
                    const id = parseInt(el.dataset.id);
                    const book = booksCatalog.find(b => b.id === id);
                    if(book) toggleWishlist(book);
                    renderPanelContent();
                });
            });
        }
    }

    // ================================
    // 10. PANEL EVENTS & SEARCH
    // ================================
    function setupUIEvents() {
        const panel = document.getElementById("sidePanel");
        document.getElementById("cartIconBtn").addEventListener("click", () => {
            currentPanelMode = "cart";
            renderPanelContent();
            panel.classList.add("open");
        });
        document.getElementById("wishlistIconBtn").addEventListener("click", () => {
            currentPanelMode = "wishlist";
            renderPanelContent();
            panel.classList.add("open");
        });
        document.getElementById("closePanelBtn").addEventListener("click", () => panel.classList.remove("open"));
        document.getElementById("checkoutActionBtn").addEventListener("click", () => {
            if (currentPanelMode === "cart") {
                if (cart.length === 0) alert("Your cart is empty.");
                else alert(`✅ Order placed! Total: $${cart.reduce((s,i)=> s + i.price*i.qty,0).toFixed(2)}. Thank you.`);
            }
        });

        const searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("input", (e) => {
            searchQuery = e.target.value;
            renderFilteredBooks();
        });
    }

    // ================================
    // 11. INITIALIZATION
    // ================================
    function init() {
        loadStorage();
        renderHero();
        renderGenreFilters();
        renderFilteredBooks();
        setupUIEvents();
    }
    init();
</script>
</body>
</html>
